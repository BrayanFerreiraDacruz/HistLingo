name: Keep Server Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Install paramiko
        run: pip install paramiko -q

      - name: SSH restart via Python
        env:
          SSH_PASS: ${{ secrets.SSH_PASS }}
        run: |
          python3 << 'PYEOF'
          import paramiko, os, sys

          host = '147.93.37.148'
          port = 65002
          user = 'u694432103'
          pwd  = os.environ['SSH_PASS']

          client = paramiko.SSHClient()
          client.set_missing_host_key_policy(paramiko.AutoAddPolicy())

          try:
              client.connect(host, port=port, username=user, password=pwd,
                             timeout=30, auth_timeout=20, banner_timeout=20)
              _, out, err = client.exec_command(
                  'export PATH=/opt/alt/alt-nodejs20/root/usr/bin:/home/u694432103/local/bin:/usr/local/bin:/usr/bin:/bin; '
                  'export HOME=/home/u694432103; '
                  '/home/u694432103/histlingo/start.sh',
                  timeout=60
              )
              stdout_data = out.read().decode()
              stderr_data = err.read().decode()
              print("STDOUT:", stdout_data)
              if stderr_data:
                  print("STDERR:", stderr_data)
              client.close()
              print("Done.")
          except Exception as e:
              print(f"SSH failed: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF
