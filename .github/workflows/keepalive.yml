name: Keep Server Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Restart histlingo if down
        env:
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          sshpass -e ssh \
            -p 65002 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            u694432103@147.93.37.148 \
            "/home/u694432103/histlingo/start.sh"
