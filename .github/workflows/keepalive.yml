name: Keep Server Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Restart histlingo if down
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.93.37.148
          port: 65002
          username: u694432103
          password: ${{ secrets.SSH_PASS }}
          script: /home/u694432103/histlingo/start.sh
          command_timeout: 60s
