name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Install paramiko
        run: pip install paramiko -q

      - name: SSH diagnose
        env:
          SSH_PASS: ${{ secrets.SSH_PASS }}
        run: |
          python3 << 'PYEOF'
          import paramiko, os

          client = paramiko.SSHClient()
          client.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          client.connect('147.93.37.148', port=65002, username='u694432103',
                         password=os.environ['SSH_PASS'], timeout=30)

          def run(cmd, t=30):
              _, o, e = client.exec_command(
                  f'export PATH=/opt/alt/alt-nodejs20/root/usr/bin:/home/u694432103/local/bin:/usr/local/bin:/usr/bin:/bin; export HOME=/home/u694432103; {cmd}',
                  timeout=t)
              out = o.read().decode('utf-8', errors='replace')
              err = e.read().decode('utf-8', errors='replace')
              return out, err

          print("=== PM2 LIST ===")
          o, e = run('pm2 list 2>&1 || echo "PM2 not running"')
          print(o or e)

          print("=== PM2 LOGS (last 50 lines) ===")
          o, e = run('pm2 logs histlingo --lines 50 --nostream 2>&1 || cat ~/.pm2/logs/histlingo-error.log 2>/dev/null | tail -50')
          print(o or e)

          print("=== PORT 3000 STATUS ===")
          o, e = run('curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:3000/api/health 2>&1')
          print("HTTP:", o or e)

          print("=== NODE VERSION ===")
          o, e = run('node --version 2>&1')
          print(o or e)

          client.close()
          PYEOF
