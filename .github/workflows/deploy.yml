name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build backend (NestJS)
        run: npm ci && npm run build

      - name: Build frontend (React/Vite)
        run: npm --prefix histlingo-web ci && npm --prefix histlingo-web run build

      - name: Upload backend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 147.93.37.148
          port: 65002
          username: u694432103
          password: ${{ secrets.SSH_PASS }}
          source: dist/,ecosystem.config.js,package.json,package-lock.json,prisma/
          target: /home/u694432103/histlingo/
          strip_components: 0

      - name: Upload frontend to public_html
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 147.93.37.148
          port: 65002
          username: u694432103
          password: ${{ secrets.SSH_PASS }}
          source: histlingo-web/dist/
          target: /home/u694432103/public_html/
          strip_components: 2

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.93.37.148
          port: 65002
          username: u694432103
          password: ${{ secrets.SSH_PASS }}
          command_timeout: 60s
          script: |
            export PATH=/opt/alt/alt-nodejs20/root/usr/bin:/home/u694432103/local/bin:/usr/local/bin:/usr/bin:/bin
            export HOME=/home/u694432103
            cd /home/u694432103/histlingo

            mkdir -p /home/u694432103/histlingo/logs

            pm2 stop histlingo 2>/dev/null || true
            pm2 delete histlingo 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            sleep 8
            curl -sf http://127.0.0.1:3000/api/health && echo "HEALTH OK" || echo "HEALTH FAIL"
            pm2 list
            echo "Deploy concluido com sucesso!"
